<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>

<body class="preload">
  <div class="container">
    <div class="header">
      <!-- Settings Icon (Top Left) -->
      <div id="history-btn" class="header-icon history-icon-left" title="Open Settings & History">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
          </path>
        </svg>
      </div>



      <img src="assets/link-booster-logo-clean.png" alt="Logo"
        style="height: 40px; margin-left: auto; margin-right: auto;">

      <!-- Theme Icon (Top Right) -->
      <div id="theme-toggle" class="header-icon" title="Toggle Dark Mode">
        <!-- Icon injected by JS -->
      </div>
    </div>

    <div class="actions-row">
      <button id="copy-btn" class="primary-btn">
        <svg class="link-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
        </svg>
        Copy Boosted Link
      </button>
      <button id="qr-btn" class="secondary-btn" title="Generate QR Code"
        style="width: auto; padding: 0 12px; gap: 6px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
          <path d="M3 14h7v7H3z"></path>
        </svg>
        QR Code
      </button>
    </div>

    <!-- QR Overlay -->
    <div id="qr-overlay" class="qr-overlay" style="display: none;">
      <div class="qr-card">
        <button id="close-qr" class="close-btn">&times;</button>
        <h3>QR Code</h3>
        <div class="qr-wrapper">
          <div id="qrcode"></div>
          <img src="assets/icons/icon48.png" class="qr-logo" alt="Logo">
        </div>
        <div id="qr-url" class="qr-url"></div>
        <div class="qr-actions">
          <button id="download-png" class="action-btn small-btn">Download PNG</button>
          <button id="download-svg" class="action-btn small-btn">Download SVG</button>
        </div>
      </div>
    </div>

    <div class="settings-title">Copied links should be:</div>

    <div class="settings">

      <div class="toggle-row">
        <span>Decoded <span class="info-icon"
            data-tooltip="Converts encoded URLs into readable text.&#10;Example: 'https://domain.co.il/%D7%A9%D7%9C%D7%95%D7%9D' → 'https://domain.co.il/שלום'">?</span></span>
        <label class="switch">
          <input type="checkbox" id="decoded-toggle">
          <span class="slider"></span>
        </label>
      </div>

      <div class="toggle-row">
        <span>Clean of Tracking <span class="info-icon"
            data-tooltip="Removes marketing trackers from the URL.&#10;Example: removes '?utm_source=...', 'fbclid=...'">?</span></span>
        <label class="switch">
          <input type="checkbox" id="clean-toggle">
          <span class="slider"></span>
        </label>
      </div>

      <div class="toggle-row">
        <span>Enable Social Share <span class="info-icon"
            data-tooltip="Shows a popup to share the link you copied to WhatsApp, Telegram, Linkedin and Facebook.">?</span></span>
        <label class="switch">
          <input type="checkbox" id="social-toggle">
          <span class="slider"></span>
        </label>
      </div>

      <div class="toggle-row">
        <span>Add UTM Parameters <span class="info-icon"
            data-tooltip="Append custom tracking parameters (utm_source, etc.) to the copied link.&#10;Note: Spaces will be converted to '+' signs.">?</span>
          <a href="#" id="learn-utm-link"
            style="font-size:10px; margin-left:6px; color:#25D6D7; text-decoration:none;">Learn about UTMs</a>
        </span>
        <label class="switch">
          <input type="checkbox" id="utm-toggle">
          <span class="slider"></span>
        </label>
      </div>

      <div id="utm-accordion" class="accordion">
        <div class="presets-row">
          <select id="preset-selector">
            <option value="">Select Preset...</option>
          </select>
          <button id="save-preset-btn" class="icon-btn" title="Save current values as new preset">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
              <polyline points="17 21 17 13 7 13 7 21"></polyline>
              <polyline points="7 3 7 8 15 8"></polyline>
            </svg>
          </button>
          <button id="delete-preset-btn" class="icon-btn" title="Delete selected preset"
            style="display:none; color: #ff7675; border-color: #fab1a0;">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
              <line x1="10" y1="11" x2="10" y2="17"></line>
              <line x1="14" y1="11" x2="14" y2="17"></line>
            </svg>
          </button>
        </div>
        <div class="input-group">
          <input type="text" id="utm-source" class="utm-input floating-input" placeholder=" ">
          <label for="utm-source" class="floating-label">utm_source</label>
        </div>
        <div class="input-group">
          <input type="text" id="utm-medium" class="utm-input floating-input" placeholder=" ">
          <label for="utm-medium" class="floating-label">utm_medium</label>
        </div>
        <div class="input-group">
          <input type="text" id="utm-campaign" class="utm-input floating-input" placeholder=" ">
          <label for="utm-campaign" class="floating-label">utm_campaign</label>
        </div>

        <div class="input-group">
          <input type="text" id="utm-term" class="utm-input floating-input" placeholder=" ">
          <label for="utm-term" class="floating-label">utm_term</label>
        </div>
        <div class="input-group">
          <input type="text" id="utm-content" class="utm-input floating-input" placeholder=" ">
          <label for="utm-content" class="floating-label">utm_content</label>
        </div>
        <div class="input-group">
          <input type="text" id="utm-id" class="utm-input floating-input" placeholder=" ">
          <label for="utm-id" class="floating-label">utm_id</label>
        </div>
      </div>

      <div class="toggle-row">
        <span>Shorten Link <span class="info-icon"
            data-tooltip="Converts the link to a Short URL (TinyURL) for easier sharing.">?</span></span>
        <label class="switch">
          <input type="checkbox" id="shorten-toggle">
          <span class="slider"></span>
        </label>
      </div>

      <div class="shortcut-row">
        <span>Keyboard Shortcut <span class="info-icon"
            data-tooltip="Press this combination on any page to copy/share the link instantly.">?</span></span>
        <input type="text" id="shortcut-input" placeholder="Alt+Shift+C">
      </div>
    </div>

    <div class="decoder-section">
      <div class="decoder-header">
        <span style="font-size: 13px; font-weight: 500; color: #2d3436;">Manual Decoder</span>
        <button id="manual-decode-btn" class="small-btn">Decode</button>
      </div>
      <textarea id="decoder-input" placeholder="Paste encoded URL here..."></textarea>
    </div>

    <div class="status" id="status-msg"></div>

    <!-- Custom Modal -->
    <div id="preset-modal" class="modal-overlay" style="display:none;">
      <div class="modal-card">
        <h3>Save Preset</h3>
        <input type="text" id="preset-name-input" placeholder="Preset Name (e.g. FB Ads)" class="modal-input">
        <div class="modal-actions">
          <button id="cancel-preset" class="secondary-btn small-btn">Cancel</button>
          <button id="confirm-preset" class="primary-btn small-btn">Save</button>
        </div>
      </div>
    </div>

    <!-- Confirm Modal -->
    <div id="confirm-modal" class="modal-overlay" style="display:none;">
      <div class="modal-card">
        <h3>Delete Preset</h3>
        <p class="modal-text">Are you sure you want to delete this preset?</p>
        <div class="modal-actions">
          <button id="cancel-confirm" class="secondary-btn small-btn">Cancel</button>
          <button id="ok-confirm" class="small-btn"
            style="background: #ff7675; color: white; border: none;">Delete</button>
        </div>
      </div>
    </div>

  </div>
  <script src="assets/qrcode.min.js"></script>
  <script src="popup.js"></script>
</body>

</html>
